name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # 建议使用你项目使用的 Node.js 版本
          cache: 'pnpm'       # 启用缓存以加速依赖安装

      - name: Install dependencies
        run: pnpm ci          # 使用 pnpm ci 进行更可靠的依赖安装

      - name: Build
        run: pnpm run build   # 【关键修改】执行构建命令，生成 dist 目录

      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist/public' # 上传你 Vite 配置中指定的输出目录
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
